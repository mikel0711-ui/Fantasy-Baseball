name: Fantasy Baseball Assistant
on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * *"   # runs daily at 11:00 UTC (6am Central)
jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # <-- needed to let the workflow push commits
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install packages
        run: pip install -r requirements.txt
      - name: Run Export
        env:
          ESPN_S2: ${{ secrets.ESPN_S2 }}
          SWID: ${{ secrets.SWID }}
        run: python export.py
      - name: Commit and push exports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add exports/
          git commit -m "Automated export $(date -u +'%Y-%m-%d')" || echo "No changes to commit"
          git push
